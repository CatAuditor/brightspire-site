<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sortie — Brightspire Media</title>
  <meta name="description" content="Sortie is field organizing software for canvassing campaigns." />
  <meta property="og:title" content="Sortie Field" />
  <meta property="og:description" content="Field organizing software for canvassing campaigns." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #131316;
      --border: #1e1e24;
      --text: #e2e2e2;
      --muted: #555;
      --accent: #c4922a;
      --accent-glow: rgba(196, 146, 42, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 22px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    header a.contact {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    header a.contact:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 24px 64px;
    }

    .hero-name {
      font-size: clamp(5rem, 18vw, 10.5rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.88;
      color: var(--text);
      margin-bottom: 20px;
    }

    .hero-name .dot {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(0.82rem, 2vw, 0.92rem);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 64px;
    }

    .download-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .download-label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .store-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      min-width: 158px;
      transition: border-color 0.15s, background 0.15s;
    }

    .store-btn:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .store-btn svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    .store-btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .store-btn-sub {
      font-size: 0.6rem;
      color: var(--muted);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .store-btn-name {
      font-size: 0.83rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    footer {
      padding: 20px 36px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    footer p {
      font-size: 0.72rem;
      color: var(--muted);
    }

    footer a {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      header { padding: 18px 20px; }
      footer { padding: 16px 20px; }
      .store-buttons { flex-direction: column; align-items: center; }
      .store-btn { width: 200px; }
    }
  </style>
</head>
<body>

  <header>
    <span class="wordmark">Brightspire</span>
    <a class="contact" href="mailto:info@brightspiremedia.com">Contact</a>
  </header>

  <main id="download">

    <h1 class="hero-name">SORTIE<span class="dot">.</span></h1>
    <p class="hero-sub">Field organizing software</p>

    <div class="download-section">
      <span class="download-label">Download</span>
      <div class="store-buttons">

        <a class="store-btn" href="#" id="ios-btn">
          <!-- Apple wordmark glyph -->
          <svg width="18" height="22" viewBox="0 0 814 1000" fill="#e2e2e2" xmlns="http://www.w3.org/2000/svg">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-150.3-109.4c-56.6-84.8-101.5-216.9-101.5-343.3 0-123.1 38.1-148.9 51.7-213.9 13.2-62.8 17.2-80.1 17.2-124.4 0-1.2 0-2.4-.1-3.6-.4-36.4-3.4-73.4-10.8-109.3 31.7 1.9 63.4 13.9 90.5 29.7 57.4 33.3 92.2 96 92.2 162.7 0 2.7-.1 5.4-.3 8.1-1.5 10.8-3.7 20.4-6.7 28.1-6.3 16.4-14.4 36.9-14.4 56.6 0 11.1 1.2 21.8 3.3 32.2 27.9-9.3 57.2-14.3 87.5-14.3 198 0 263.7 153.4 264.8 158.1l.1.3c-.8-2.8-1.9-5.5-3.2-8z"/>
          </svg>
          <div class="store-btn-text">
            <span class="store-btn-sub">Download on the</span>
            <span class="store-btn-name">App Store</span>
          </div>
        </a>

        <a class="store-btn" href="#" id="android-btn">
          <!-- Google Play triangle glyph -->
          <svg width="18" height="20" viewBox="0 0 512 512" fill="#e2e2e2" xmlns="http://www.w3.org/2000/svg">
            <path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l232.4-232.4L47 0zm400 175.6L342.2 239 47 .7l400 175zm0 160.8L47 511.3l295.2-63.4 105.1-63.2z"/>
          </svg>
          <div class="store-btn-text">
            <span class="store-btn-sub">Get it on</span>
            <span class="store-btn-name">Google Play</span>
          </div>
        </a>

      </div>
    </div>

  </main>

  <footer>
    <p>&copy; 2026 Brightspire Media</p>
    <a href="/privacy.html">Privacy</a>
  </footer>

</body>
</html>
