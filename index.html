<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sortie — Brightspire Media</title>
  <meta name="description" content="Sortie is field organizing software for canvassing campaigns." />
  <meta property="og:title" content="Sortie Field" />
  <meta property="og:description" content="Field organizing software for canvassing campaigns." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/brands.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #131316;
      --border: #1e1e24;
      --text: #e2e2e2;
      --muted: #555;
      --accent: #c4922a;
      --accent-glow: rgba(196, 146, 42, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 22px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    header a.contact {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    header a.contact:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 24px 64px;
    }

    .hero-name {
      font-size: clamp(5rem, 18vw, 10.5rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.88;
      color: var(--text);
      margin-bottom: 20px;
    }

    .hero-name .dot {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(0.82rem, 2vw, 0.92rem);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 64px;
    }

    .download-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .download-label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .store-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      min-width: 158px;
      transition: border-color 0.15s, background 0.15s;
    }

    .store-btn:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .store-btn i {
      flex-shrink: 0;
      font-size: 1.4rem;
      opacity: 0.85;
      width: 20px;
      text-align: center;
    }

    .store-btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .store-btn-sub {
      font-size: 0.6rem;
      color: var(--muted);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .store-btn-name {
      font-size: 0.83rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    footer {
      padding: 20px 36px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    footer p {
      font-size: 0.72rem;
      color: var(--muted);
    }

    footer a {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      header { padding: 18px 20px; }
      footer { padding: 16px 20px; }
      .store-buttons { flex-direction: column; align-items: center; }
      .store-btn { width: 200px; }
    }
  </style>
</head>
<body>

  <header>
    <span class="wordmark">Brightspire</span>
    <a class="contact" href="mailto:info@brightspiremedia.com">Contact</a>
  </header>

  <main id="download">

    <h1 class="hero-name">SORTIE<span class="dot">.</span></h1>
    <p class="hero-sub">Field organizing software</p>

    <div class="download-section">
      <span class="download-label">Download</span>
      <div class="store-buttons">

        <a class="store-btn" href="#" id="ios-btn">
          <i class="fa-brands fa-apple"></i>
          <div class="store-btn-text">
            <span class="store-btn-sub">Download on the</span>
            <span class="store-btn-name">App Store</span>
          </div>
        </a>

        <a class="store-btn" href="#" id="android-btn">
          <i class="fa-brands fa-google-play"></i>
          <div class="store-btn-text">
            <span class="store-btn-sub">Get it on</span>
            <span class="store-btn-name">Google Play</span>
          </div>
        </a>

      </div>
    </div>

  </main>

  <footer>
    <p>&copy; 2026 Brightspire Media</p>
    <a href="/privacy.html">Privacy</a>
  </footer>

</body>
</html>
