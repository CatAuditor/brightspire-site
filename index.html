<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brightspire Media</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .logo span {
      color: #f59e0b;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: #fff; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }

    .badge {
      display: inline-block;
      background: rgba(245, 158, 11, 0.12);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      max-width: 760px;
      margin-bottom: 24px;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(90deg, #f59e0b, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.sub {
      font-size: 1.15rem;
      color: #888;
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .cta-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-primary {
      background: #f59e0b;
      color: #0a0a0f;
    }

    .btn-secondary {
      background: transparent;
      color: #f0f0f0;
      border: 1px solid #333;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Bright<span>spire</span> Media</div>
    <a href="mailto:hello@brightspiremedia.com">Contact</a>
    <a href="/privacy.html">Privacy Policy</a>
  </nav>

  <main>
    <div class="badge">Coming Soon</div>
    <h1>Media that <em>moves</em> people.</h1>
    <p class="sub">Brightspire Media is building something. Check back soon or reach out to learn more.</p>
    <div class="cta-group">
      <a class="btn btn-primary" href="mailto:hello@brightspiremedia.com">Get in Touch</a>
      <a class="btn btn-secondary" href="#">Learn More</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Brightspire Media. All rights reserved.
  </footer>

</body>
</html>
