<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Sortie</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/brands.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e;
      --surface: #131316;
      --border: #1e1e24;
      --text: #e2e2e2;
      --muted: #555;
      --accent: #c4922a;
      --accent-glow: rgba(196, 146, 42, 0.08);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .wordmark {
      position: fixed;
      top: 22px;
      left: 36px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }
    h1 span { color: var(--accent); }
    p {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 36px;
    }
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 220px;
    }
    .store-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .store-btn:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .store-btn i { flex-shrink: 0; font-size: 1.4rem; opacity: 0.85; width: 20px; text-align: center; }
    .store-btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .store-btn-sub {
      font-size: 0.6rem;
      color: var(--muted);
      line-height: 1;
    }
    .store-btn-name {
      font-size: 0.83rem;
      font-weight: 600;
      line-height: 1;
    }
    /* Hidden by default; JS shows the right one */
    #ios-btn, #android-btn { display: none; }
  </style>
  <script>
    // On desktop, redirect to the web app preserving the invite token.
    // On mobile, this page is only reached if the app is not installed —
    // iOS/Android intercept the URL and open the app if it is.
    (function () {
      var ua = navigator.userAgent;
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      if (!isIOS && !isAndroid) {
        // Desktop — hand off to the web app
        window.location.replace(
          'https://volunteer-hq.vercel.app/join' + window.location.search
        );
      }
    })();
  </script>
</head>
<body>

  <span class="wordmark">Sortie</span>

  <h1>You're invited<span>.</span></h1>
  <p>Download Sortie to join the project.</p>

  <div class="store-buttons" id="store-buttons">

    <a class="store-btn" href="#" id="ios-btn">
      <i class="fa-brands fa-apple"></i>
      <div class="store-btn-text">
        <span class="store-btn-sub">Download on the</span>
        <span class="store-btn-name">App Store</span>
      </div>
    </a>

    <a class="store-btn" href="#" id="android-btn">
      <i class="fa-brands fa-google-play"></i>
      <div class="store-btn-text">
        <span class="store-btn-sub">Get it on</span>
        <span class="store-btn-name">Google Play</span>
      </div>
    </a>

  </div>

  <script>
    // Show the right button based on OS
    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) {
      document.getElementById('ios-btn').style.display = 'flex';
    } else if (/Android/i.test(ua)) {
      document.getElementById('android-btn').style.display = 'flex';
    } else {
      // Fallback: show both (desktop redirect above may not have fired yet)
      document.getElementById('ios-btn').style.display = 'flex';
      document.getElementById('android-btn').style.display = 'flex';
    }
  </script>

</body>
</html>
