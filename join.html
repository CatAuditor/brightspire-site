<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Sortie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e;
      --surface: #131316;
      --border: #1e1e24;
      --text: #e2e2e2;
      --muted: #555;
      --accent: #c4922a;
      --accent-glow: rgba(196, 146, 42, 0.08);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .wordmark {
      position: fixed;
      top: 22px;
      left: 36px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }
    h1 span { color: var(--accent); }
    p {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 36px;
    }
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 220px;
    }
    .store-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .store-btn:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .store-btn svg { flex-shrink: 0; opacity: 0.85; }
    .store-btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .store-btn-sub {
      font-size: 0.6rem;
      color: var(--muted);
      line-height: 1;
    }
    .store-btn-name {
      font-size: 0.83rem;
      font-weight: 600;
      line-height: 1;
    }
    /* Hidden by default; JS shows the right one */
    #ios-btn, #android-btn { display: none; }
  </style>
  <script>
    // On desktop, redirect to the web app preserving the invite token.
    // On mobile, this page is only reached if the app is not installed —
    // iOS/Android intercept the URL and open the app if it is.
    (function () {
      var ua = navigator.userAgent;
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      if (!isIOS && !isAndroid) {
        // Desktop — hand off to the web app
        window.location.replace(
          'https://volunteer-hq.vercel.app/join' + window.location.search
        );
      }
    })();
  </script>
</head>
<body>

  <span class="wordmark">Sortie</span>

  <h1>You're invited<span>.</span></h1>
  <p>Download Sortie to join the project.</p>

  <div class="store-buttons" id="store-buttons">

    <a class="store-btn" href="#" id="ios-btn">
      <svg width="18" height="22" viewBox="0 0 814 1000" fill="#e2e2e2">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-150.3-109.4c-56.6-84.8-101.5-216.9-101.5-343.3 0-123.1 38.1-148.9 51.7-213.9 13.2-62.8 17.2-80.1 17.2-124.4 0-1.2 0-2.4-.1-3.6-.4-36.4-3.4-73.4-10.8-109.3 31.7 1.9 63.4 13.9 90.5 29.7 57.4 33.3 92.2 96 92.2 162.7 0 2.7-.1 5.4-.3 8.1-1.5 10.8-3.7 20.4-6.7 28.1-6.3 16.4-14.4 36.9-14.4 56.6 0 11.1 1.2 21.8 3.3 32.2 27.9-9.3 57.2-14.3 87.5-14.3 198 0 263.7 153.4 264.8 158.1l.1.3c-.8-2.8-1.9-5.5-3.2-8z"/>
      </svg>
      <div class="store-btn-text">
        <span class="store-btn-sub">Download on the</span>
        <span class="store-btn-name">App Store</span>
      </div>
    </a>

    <a class="store-btn" href="#" id="android-btn">
      <svg width="18" height="20" viewBox="0 0 512 512" fill="#e2e2e2">
        <path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l232.4-232.4L47 0zm400 175.6L342.2 239 47 .7l400 175zm0 160.8L47 511.3l295.2-63.4 105.1-63.2z"/>
      </svg>
      <div class="store-btn-text">
        <span class="store-btn-sub">Get it on</span>
        <span class="store-btn-name">Google Play</span>
      </div>
    </a>

  </div>

  <script>
    // Show the right button based on OS
    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) {
      document.getElementById('ios-btn').style.display = 'flex';
    } else if (/Android/i.test(ua)) {
      document.getElementById('android-btn').style.display = 'flex';
    } else {
      // Fallback: show both (desktop redirect above may not have fired yet)
      document.getElementById('ios-btn').style.display = 'flex';
      document.getElementById('android-btn').style.display = 'flex';
    }
  </script>

</body>
</html>
